<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f172a"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Seabass · School‑Safe Unsplash</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=DM+Sans:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root {
--bg: #0f172a;
--surface: #1e293b;
--border: #334155;
--accent: #38bdf8;
--green: #10b981;
--red: #f43f5e;
--text: #f1f5f9;
--muted: #64748b;
--radius: 22px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }
.app {
display: flex;
flex-direction: column;
height: 100dvh;
padding: 14px;
gap: 14px;
}
.frame {
flex: 1 1 0;
background: var(--surface);
border: 2px solid var(--border);
border-radius: var(--radius);
overflow: hidden;
position: relative;
display: flex;
align-items: center;
justify-content: center;
transition: border-color 0.25s;
}
.frame.lit { border-color: var(--accent); }
.idle-msg {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
color: var(--muted);
user-select: none;
pointer-events: none;
font-family: 'DM Sans', sans-serif;
}
.idle-msg .fish {
font-size: 64px;
filter: drop-shadow(0 0 18px var(--accent));
animation: bob 3s ease-in-out infinite;
}
@keyframes bob {
0%,100% { transform: translateY(0); }
50% { transform: translateY(-8px);}
}
.idle-msg .prompt-text {
font-size: 15px;
letter-spacing: 1.5px;
text-transform: uppercase;
font-weight: 700;
}
#photoImg {
width: 100%;
height: 100%;
object-fit: cover;
display: none;
}
.frame-label {
position: absolute;
bottom: 14px;
left: 50%;
transform: translateX(-50%);
background: rgba(15,23,42,0.85);
backdrop-filter: blur(10px);
border: 1px solid var(--border);
border-radius: 100px;
padding: 6px 20px;
font-family: 'DM Sans', sans-serif;
font-size: 15px;
font-weight: 900;
color: var(--accent);
letter-spacing: 1.5px;
text-transform: uppercase;
white-space: nowrap;
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
}
.frame-label.show { opacity: 1; }
@keyframes shimmer {
0% { background-position: -600px 0; }
100% { background-position: 600px 0; }
}
.frame.loading::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(90deg, transparent, rgba(56,189,248,0.06), transparent);
background-size: 600px 100%;
animation: shimmer 1.1s infinite;
pointer-events: none;
}
.input-row {
flex-shrink: 0;
position: relative;
display: flex;
gap: 10px;
align-items: stretch;
}
.input-wrap {
flex: 1;
position: relative;
}
#wordInput {
width: 100%;
background: var(--surface);
border: 2px solid var(--border);
border-radius: var(--radius);
color: var(--text);
font-family: 'DM Sans', sans-serif;
font-size: 22px;
font-weight: 700;
padding: 18px 52px 18px 22px;
outline: none;
transition: border-color 0.15s;
-webkit-appearance: none;
caret-color: var(--accent);
}
#wordInput:focus { border-color: var(--accent); }
#wordInput::placeholder {
color: var(--muted);
font-weight: 700;
font-size: 18px;
}
#ghost {
position: absolute;
left: 22px;
top: 50%;
transform: translateY(-50%);
font-family: 'DM Sans', sans-serif;
font-size: 22px;
font-weight: 700;
color: var(--muted);
pointer-events: none;
white-space: pre;
opacity: 0.45;
}
.clear-btn {
position: absolute;
right: 14px;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
color: var(--muted);
font-size: 22px;
cursor: pointer;
padding: 4px;
line-height: 1;
display: none;
-webkit-tap-highlight-color: transparent;
}
.clear-btn.show { display: block; }
#dropdown {
position: absolute;
bottom: calc(100% + 8px);
left: 0; right: 0;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
overflow: hidden;
z-index: 50;
box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
display: none;
}
#dropdown.open { display: block; }
.drop-item {
padding: 15px 20px;
font-family: 'DM Sans', sans-serif;
font-size: 18px;
font-weight: 700;
cursor: pointer;
border-bottom: 1px solid var(--border);
transition: background 0.1s;
-webkit-tap-highlight-color: transparent;
display: flex;
align-items: center;
gap: 10px;
}
.drop-item:last-child { border-bottom: none; }
.drop-item.sel,
.drop-item:active { background: rgba(56,189,248,0.12); color: var(--accent); }
.drop-hi { color: var(--accent); }
.voice-btn {
background: var(--green);
border: none;
border-radius: var(--radius);
color: #fff;
font-size: 26px;
width: 66px;
min-width: 66px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.15s, transform 0.1s;
-webkit-tap-highlight-color: transparent;
}
.voice-btn:active { transform: scale(0.92); }
.voice-btn.listening {
background: var(--red);
animation: pulse 1s infinite;
}
@keyframes pulse {
0%,100% { box-shadow: 0 0 0 0 rgba(244,63,94,0.5); }
50% { box-shadow: 0 0 0 12px rgba(244,63,94,0); }
}
</style>
</head>
<body>
<div class="app">
<div class="frame" id="frame">
<div class="idle-msg" id="idleMsg">
<div class="fish">🐟</div>
<div class="prompt-text">What's the word?</div>
</div>
<img id="photoImg" alt="Unsplash image" />
<div class="frame-label" id="frameLabel"></div>
</div>

<div class="input-row">
<div class="input-wrap">
<span id="ghost"></span>
<input id="wordInput" type="search"
placeholder="Type or speak a word…"
autocomplete="off" autocorrect="off"
autocapitalize="off" spellcheck="false"/>
<button class="clear-btn" id="clearBtn" aria-label="Clear">✕</button>
<div id="dropdown"></div>
</div>
<button class="voice-btn" id="voiceBtn" aria-label="Speak">🎤</button>
</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// WORD LIST (for autocomplete)
// ─────────────────────────────────────────────────────────────
const WORD_LIST = [
"backpack", "bathroom", "cafeteria", "classroom", "computer",
"desk", "door", "drink", "eat", "gym", "hallway", "homework",
"library", "locker", "lunch", "pencil", "playground", "school bus",
"sit down", "stand up", "teacher", "water fountain", "bus"
];

// Optional emoji for dropdown
const EMOJI = {
"backpack":"🎒","bathroom":"🚽","cafeteria":"🍽️","classroom":"📚",
"computer":"💻","desk":"🪑","door":"🚪","drink":"🥤","eat":"🍔",
"gym":"🏋️","hallway":"🚶","homework":"📝","library":"📖","locker":"🔒",
"lunch":"🥪","pencil":"✏️","playground":"🛝","school bus":"🚌",
"sit down":"💺","stand up":"🧍","teacher":"👩‍🏫","water fountain":"💧","bus":"🚌"
};

// ─────────────────────────────────────────────────────────────
// QUERY MAPPING – turn generic words into school‑friendly searches
// Add or edit entries as you like.
// ─────────────────────────────────────────────────────────────
const QUERY_MAP = {
"bus": "school bus",
"bus stop": "school bus",
"cafeteria": "school cafeteria",
"lunch": "school lunch",
"playground": "school playground",
"locker": "school locker",
"hallway": "school hallway",
"gym": "school gymnasium",
"library": "school library",
"classroom": "school classroom",
"desk": "classroom desk",
"computer": "school computer",
"pencil": "school pencil",
"backpack": "school backpack",
"teacher": "teacher in classroom",
"water fountain": "school water fountain",
"door": "school door",
"drink": "child drinking water",
"eat": "child eating lunch",
"homework": "student doing homework",
"sit down": "students sitting",
"stand up": "students standing"
};

// DOM elements
const inp = document.getElementById('wordInput');
const ghost = document.getElementById('ghost');
const clearBtn = document.getElementById('clearBtn');
const dropdown = document.getElementById('dropdown');
const frame = document.getElementById('frame');
const idleMsg = document.getElementById('idleMsg');
const photoImg = document.getElementById('photoImg');
const frameLabel = document.getElementById('frameLabel');
const voiceBtn = document.getElementById('voiceBtn');

let selIdx = -1;
let currentMatches = [];

// ── Autocomplete logic ─────────────────────────────────────
function onType() {
const q = inp.value.toLowerCase();
clearBtn.classList.toggle('show', q.length > 0);
if (!q) {
closeDropdown();
setGhost('');
return;
}
let matches = WORD_LIST.filter(w => w.startsWith(q));
const extra = WORD_LIST.filter(w => w.includes(q) && !w.startsWith(q));
matches = [...matches, ...extra];
currentMatches = matches;

const topPrefix = WORD_LIST.find(w => w.startsWith(q));
setGhost(topPrefix ? inp.value + topPrefix.slice(q.length) : '');

if (currentMatches.length) showDropdown(currentMatches, q);
else closeDropdown();
}

function setGhost(text) { ghost.textContent = text; }

function showDropdown(matches, q) {
selIdx = -1;
dropdown.innerHTML = matches.slice(0, 7).map(w => {
const typed = q.length;
const hi = `<span class="drop-hi">${escapeHtml(w.slice(0, typed))}</span>${escapeHtml(w.slice(typed))}`;
const emoji = EMOJI[w] || '📷';
return `<div class="drop-item" data-word="${escapeAttr(w)}">${emoji} ${hi}</div>`;
}).join('');
dropdown.querySelectorAll('.drop-item').forEach(el => {
el.addEventListener('mousedown', e => { e.preventDefault(); pick(el.dataset.word); });
el.addEventListener('touchend', e => { e.preventDefault(); pick(el.dataset.word); });
});
dropdown.classList.add('open');
}

function closeDropdown() { dropdown.classList.remove('open'); selIdx = -1; }

function highlight(items) {
items.forEach((el, i) => el.classList.toggle('sel', i === selIdx));
if (items[selIdx]) items[selIdx].scrollIntoView({ block: 'nearest' });
}

function pick(word) {
inp.value = word;
setGhost('');
closeDropdown();
showImage(word);
}

inp.addEventListener('input', onType);
inp.addEventListener('keydown', e => {
const items = dropdown.querySelectorAll('.drop-item');
if (e.key === 'Tab') {
e.preventDefault();
const top = WORD_LIST.find(w => w.startsWith(inp.value.toLowerCase()));
if (top) { inp.value = top; setGhost(''); closeDropdown(); showImage(top); }
else if (selIdx >= 0 && currentMatches[selIdx]) {
inp.value = currentMatches[selIdx]; setGhost(''); closeDropdown(); showImage(currentMatches[selIdx]);
}
}
else if (e.key === 'ArrowDown') {
e.preventDefault();
selIdx = Math.min(selIdx + 1, items.length - 1);
highlight(items);
if (currentMatches[selIdx]) setGhost(currentMatches[selIdx]);
}
else if (e.key === 'ArrowUp') {
e.preventDefault();
selIdx = Math.max(selIdx - 1, 0);
highlight(items);
if (currentMatches[selIdx]) setGhost(currentMatches[selIdx]);
}
else if (e.key === 'Enter') {
e.preventDefault();
const chosen = (selIdx >= 0 && currentMatches[selIdx])
? currentMatches[selIdx]
: WORD_LIST.find(w => w === inp.value.toLowerCase()) || currentMatches[0];
if (chosen) { inp.value = chosen; setGhost(''); closeDropdown(); showImage(chosen); }
}
else if (e.key === 'Escape') { closeDropdown(); setGhost(''); inp.blur(); }
});

clearBtn.addEventListener('click', () => {
inp.value = ''; setGhost('');
clearBtn.classList.remove('show');
closeDropdown();
inp.focus();
});

document.addEventListener('click', e => {
if (!e.target.closest('.input-wrap')) closeDropdown();
});

// ── Image loading with query mapping ───────────────────────
function showImage(word) {
inp.blur();
idleMsg.style.display = 'none';
photoImg.style.display = 'none';
frame.classList.remove('lit');
frame.classList.add('loading');
frameLabel.classList.remove('show');

// Apply query mapping for school‑appropriate images
let searchTerm = word.toLowerCase();
if (QUERY_MAP[searchTerm]) {
searchTerm = QUERY_MAP[searchTerm];
}
// Add "school" as a safe fallback context (optional)
if (!searchTerm.includes("school") && !searchTerm.includes("classroom") && !searchTerm.includes("student")) {
// You can optionally append "school" but might reduce relevance.
// For now, we rely on the mapping above.
}
const timestamp = Date.now();
const unsplashUrl = `https://source.unsplash.com/featured/1200x800?${encodeURIComponent(searchTerm)}&t=${timestamp}`;

photoImg.onload = () => {
frame.classList.remove('loading');
frame.classList.add('lit');
photoImg.style.display = 'block';
frameLabel.textContent = word; // show original word, not mapped
frameLabel.classList.add('show');
};
photoImg.onerror = () => {
frame.classList.remove('loading');
idleMsg.style.display = 'flex';
idleMsg.querySelector('.prompt-text').innerHTML = `⚠️ No image for “${escapeHtml(word)}”`;
setTimeout(() => {
if (idleMsg.style.display === 'flex') {
idleMsg.querySelector('.prompt-text').innerHTML = 'What\'s the word?';
}
}, 2000);
};
photoImg.src = unsplashUrl;
}

// ── Voice recognition ──────────────────────────────────────
let recognition = null;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
recognition = new SR();
recognition.lang = 'en-US';
recognition.interimResults = false;
recognition.maxAlternatives = 5;
recognition.onresult = e => {
const alts = Array.from(e.results[0]).map(a => a.transcript.trim().toLowerCase());
let match = null;
for (let alt of alts) {
match = WORD_LIST.find(w => w === alt)
|| WORD_LIST.find(w => w.startsWith(alt))
|| WORD_LIST.find(w => alt.startsWith(w));
if (match) break;
}
if (match) {
inp.value = match;
setGhost('');
closeDropdown();
showImage(match);
} else {
inp.value = alts[0];
onType();
}
};
recognition.onerror = () => voiceBtn.classList.remove('listening');
recognition.onend = () => voiceBtn.classList.remove('listening');
} else {
voiceBtn.style.opacity = '0.35';
voiceBtn.title = 'Voice not supported';
}

voiceBtn.addEventListener('click', () => {
if (!recognition) return;
voiceBtn.classList.add('listening');
try { recognition.start(); }
catch { recognition.stop(); setTimeout(() => recognition.start(), 150); }
});

function escapeHtml(str) {
return str.replace(/[&<>]/g, function(m) {
if (m === '&') return '&amp;';
if (m === '<') return '&lt;';
if (m === '>') return '&gt;';
return m;
});
}
function escapeAttr(str) {
return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.addEventListener('load', () => {
inp.focus();
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js').catch(() => {});
}
});
</script>
</body>
</html>
